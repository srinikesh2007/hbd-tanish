<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tanish Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{overflow:hidden;background:radial-gradient(circle at top,#0a0a12,#030305 45%,#000000 100%);color:#fff}
canvas{position:fixed;inset:0}
.screen{position:absolute;inset:0;display:flex;justify-content:center;align-items:center;flex-direction:column;transition:.7s}
.hide{opacity:0;pointer-events:none;transform:scale(.9)}
.card{padding:42px;border-radius:24px;background:rgba(255,255,255,.06);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.12);text-align:center}
button{margin-top:22px;padding:14px 34px;border:none;border-radius:40px;background:#4a8cff;color:#fff;font-size:18px;cursor:pointer;transition:.3s}
button:hover{transform:scale(1.08);box-shadow:0 0 25px #4a8cff}
.gift{font-size:120px;cursor:pointer;animation:f 2s ease-in-out infinite}
@keyframes f{50%{transform:translateY(-12px)}}
#count{font-size:10rem;font-weight:900;text-shadow:0 0 25px #7bc4ff,0 0 60px #3b82f6;animation:pop 1s ease}
@keyframes pop{
0%{transform:scale(.2);opacity:0}
40%{transform:scale(1.4)}
100%{transform:scale(1);opacity:1}
}
#final h1{font-size:5rem;line-height:1.15;text-align:center;text-shadow:0 0 25px #57a6ff,0 0 55px #2d7cff}

body::before{
content:"";
position:fixed;
inset:0;
background:linear-gradient(to bottom,rgba(255,255,255,.02),rgba(0,0,0,.45));
pointer-events:none;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="screen" id="a">
<div class="card">
<h1 id="t"></h1>
<p>Someone made this just for you.</p>
<button onclick="sw('a','b')">Start ✨</button>
</div>
</div>

<div class="screen hide" id="b">
<div class="gift" onclick="start()">🎁</div>
<h2>Click the Gift</h2>
</div>

<div class="screen hide" id="c">
<div id="count">3</div>
</div>

<div class="screen hide" id="d">
<h1>🎉<br>IDIOTTTT!!<br>HAPPIESTTTT<br>BIRTHDAYYYY<br><span style="color:#7ecbff">TANISH!!</span></h1>
</div>

<script>
const msg="Hey Tanish...";
let i=0;
(function type(){if(i<=msg.length){t.textContent=msg.slice(0,i++);setTimeout(type,110)}})();
function sw(x,y){document.getElementById(x).classList.add("hide");document.getElementById(y).classList.remove("hide")}
function burst(){
for(let i=0;i<180;i++){
 let e=document.createElement("div");
 e.style.position="absolute";
 e.style.width="8px";e.style.height="8px";
 e.style.left=Math.random()*100+"vw";
 e.style.top="-10px";
 e.style.background=`hsl(${Math.random()*360},100%,60%)`;
 e.style.transform=`rotate(${Math.random()*360}deg)`;
 e.style.animation=`fall ${2+Math.random()*2}s linear forwards`;
 document.body.appendChild(e);
 setTimeout(()=>e.remove(),4500);
}
}
const st=document.createElement("style");
st.innerHTML="@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}";
document.head.appendChild(st);

function start(){
burst();
sw('b','c');
const nums=["3","2","1","🎉"];
let k=0;
function next(){
count.style.animation="none";
void count.offsetWidth;
count.style.animation="pop .8s ease";
count.textContent=nums[k];
if(k<3){k++;setTimeout(next,900);}
else{
setTimeout(()=>{
sw('c','d');
setInterval(burst,2500);
},700);
}
}
next();
}

const c=document.getElementById("bg"),ctx=c.getContext("2d");
function rs(){c.width=innerWidth;c.height=innerHeight}
rs();onresize=rs;
let s=[...Array(180)].map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*2}));
(function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="white";
s.forEach(o=>{ctx.globalAlpha=.2+Math.random()*.8;ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,6.28);ctx.fill();});
requestAnimationFrame(draw);
})();
</script>
</body>
</html>
