<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happy Birthday Tanish 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{overflow:hidden;background:radial-gradient(circle at top,#222a72,#090b1a 70%);color:#fff}
canvas{position:fixed;inset:0}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:.8s}
.hide{opacity:0;pointer-events:none;transform:scale(.95)}
.card{backdrop-filter:blur(16px);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);padding:40px;border-radius:28px;text-align:center;box-shadow:0 0 40px rgba(0,0,0,.4)}
h1{font-size:3rem}.type{border-right:3px solid #fff;white-space:nowrap;overflow:hidden}
button{margin-top:25px;padding:15px 34px;border:none;border-radius:40px;background:linear-gradient(45deg,#5ee7ff,#7a6cff);color:#fff;font-size:1.1rem;cursor:pointer;transition:.3s}
button:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 0 20px #6cf}
.gift{font-size:120px;cursor:pointer;animation:float 2s ease-in-out infinite}
@keyframes float{50%{transform:translateY(-15px)}}
#count{font-size:8rem;font-weight:900}
#final h1{font-size:5rem;line-height:1.15;text-shadow:0 0 20px #7cf,0 0 45px #6cf}
#final p{font-size:1.3rem;margin-top:18px;max-width:700px}
.balloon{position:absolute;bottom:-120px;font-size:40px;animation:rise linear infinite}
@keyframes rise{to{transform:translateY(-120vh)}}
.conf{position:absolute;width:8px;height:8px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(120vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<canvas id="stars"></canvas>

<div id="s1" class="screen">
<div class="card">
<h1 class="type" id="typing"></h1>
<p style="margin-top:12px">Someone prepared something for you...</p>
<button onclick="goGift()">Start the Surprise ✨</button>
</div>
</div>

<div id="s2" class="screen hide">
<div class="card">
<div class="gift" onclick="openGift()">🎁</div>
<h2>Click the Gift</h2>
</div>
</div>

<div id="s3" class="screen hide">
<div id="count">3</div>
</div>

<div id="final" class="screen hide">
<h1>
🎉 IDIOTTTT!!<br>
HAPPIESTTTT<br>
BIRTHDAYYYY<br>
<span style="color:#7fe7ff">TANISH!!</span>
</h1>
<p>Hope your day is filled with laughter, good memories, amazing food, and everything that makes you smile. Have an awesome year ahead! 🥳</p>
</div>

<script>
const msg="Hey Tanish...";
let i=0;
(function type(){
 if(i<=msg.length){
   typing.textContent=msg.slice(0,i++);
   setTimeout(type,110);
 }
})();
function swap(a,b){document.getElementById(a).classList.add("hide");document.getElementById(b).classList.remove("hide")}
function goGift(){swap("s1","s2")}
function openGift(){
 confetti();
 swap("s2","s3");
 let n=3;
 count.textContent=n;
 const t=setInterval(()=>{
   n--;
   if(n>0) count.textContent=n;
   else if(n===0) count.textContent="🎉";
   else{
     clearInterval(t);
     swap("s3","final");
     fireworks();
   }
 },1000);
}
function confetti(){
 for(let i=0;i<220;i++){
  let d=document.createElement("div");
  d.className="conf";
  d.style.left=Math.random()*100+"vw";
  d.style.top="-10px";
  d.style.background=`hsl(${Math.random()*360},100%,60%)`;
  d.style.animationDuration=2+Math.random()*2+"s";
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),4500);
 }
}
for(let i=0;i<16;i++){
 let b=document.createElement("div");
 b.className="balloon";
 b.textContent=["🎈","🎉"][i%2];
 b.style.left=Math.random()*100+"vw";
 b.style.animationDuration=10+Math.random()*8+"s";
 b.style.animationDelay=Math.random()*6+"s";
 document.body.appendChild(b);
}
const c=document.getElementById("stars"),x=c.getContext("2d");
function resize(){c.width=innerWidth;c.height=innerHeight}
resize();onresize=resize;
let stars=[...Array(180)].map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*2}));
(function draw(){
 x.clearRect(0,0,c.width,c.height);
 x.fillStyle="white";
 stars.forEach(s=>{x.globalAlpha=.3+Math.random()*.7;x.beginPath();x.arc(s.x,s.y,s.r,0,6.3);x.fill();});
 requestAnimationFrame(draw);
})();
function fireworks(){
 setInterval(()=>{
   confetti();
 },2500);
}
</script>
</body>
</html>
